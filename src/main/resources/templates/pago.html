<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      lang="es"
      th:replace="~{layout :: layout(~{::title}, ~{::section})}">

    <head>
        <title>Pago</title>
    </head>

    <body>
        <section class="row justify-content-center">
            <div class="col-lg-8">
                <div class="mb-4">
                    <h1 class="page-title" id="tituloPago">Realizar pedido</h1>
                    <p class="page-subtitle" id="subtituloPago">Selecciona tu método de pago para finalizar la compra.</p>
                </div>

                <div class="table-darkish p-4">
                    <h4 class="mb-4" id="tituloMetodoPago">Seleccione su método de pago</h4>

                    <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>

                    <form id="formPago" th:action="@{/pago/finalizar}" method="post" th:object="${form}">

                        <div class="mb-4">
                            <label class="me-3">
                                <input type="radio"
                                       id="metodoTarjeta"
                                       name="metodoPago"
                                       value="tarjeta"
                                       checked>
                                <span id="lblMetodoTarjeta">Tarjeta Crédito/Débito</span>
                            </label>

                            <label>
                                <input type="radio"
                                       id="metodoEfectivo"
                                       name="metodoPago"
                                       value="efectivo">
                                <span id="lblMetodoEfectivo">Efectivo</span>
                            </label>
                        </div>

                        <div id="datosTarjeta">
                            <div class="row g-3">
                                <div class="col-md-8">
                                    <input class="form-control"
                                           type="text"
                                           id="phNumeroTarjeta"
                                           placeholder="Número de la tarjeta"
                                           maxlength="16"
                                           th:field="*{numeroTarjeta}">
                                </div>

                                <div class="col-md-4">
                                    <input class="form-control"
                                           type="text"
                                           id="phCodigoSeguridad"
                                           placeholder="Código de seguridad"
                                           th:field="*{codigoSeguridad}">
                                </div>

                                <div class="col-md-6">
                                    <input class="form-control"
                                           type="text"
                                           id="phFechaVencimiento"
                                           placeholder="dd/MM/yyyy"
                                           maxlength="10"
                                           th:field="*{fechaVencimiento}">
                                </div>

                                <div class="col-md-6">
                                    <input class="form-control"
                                           type="text"
                                           id="phNombrePropietario"
                                           placeholder="Nombre del propietario"
                                           th:field="*{nombrePropietario}">
                                </div>
                            </div>
                        </div>

                        <div class="mt-4 d-flex justify-content-end">
                            <button class="btn btn-brand px-5" type="submit" id="btnFinalizarPago">Finalizar</button>
                        </div>
                    </form>
                </div>
            </div>

            <script>
                document.addEventListener("DOMContentLoaded", function () {
                    const form = document.getElementById("formPago");
                    const numeroTarjeta = document.getElementById("phNumeroTarjeta");
                    const fechaVencimiento = document.getElementById("phFechaVencimiento");
                    const datosTarjeta = document.getElementById("datosTarjeta");
                    const metodoTarjeta = document.getElementById("metodoTarjeta");
                    const metodoEfectivo = document.getElementById("metodoEfectivo");

                    function actualizarVistaPago() {
                        if (metodoEfectivo.checked) {
                            datosTarjeta.style.display = "none";
                        } else {
                            datosTarjeta.style.display = "block";
                        }
                    }

                    metodoTarjeta.addEventListener("change", actualizarVistaPago);
                    metodoEfectivo.addEventListener("change", actualizarVistaPago);

                    actualizarVistaPago();

                    numeroTarjeta.addEventListener("input", function () {
                        this.value = this.value.replace(/\D/g, "").slice(0, 16);
                    });

                    fechaVencimiento.addEventListener("input", function () {
                        let valor = this.value.replace(/\D/g, "").slice(0, 8);

                        if (valor.length > 2 && valor.length <= 4) {
                            valor = valor.slice(0, 2) + "/" + valor.slice(2);
                        } else if (valor.length > 4) {
                            valor = valor.slice(0, 2) + "/" + valor.slice(2, 4) + "/" + valor.slice(4);
                        }

                        this.value = valor;
                    });

                    form.addEventListener("submit", function (e) {
                        if (metodoEfectivo.checked) {
                            return;
                        }

                        const tarjeta = numeroTarjeta.value.trim();
                        const fecha = fechaVencimiento.value.trim();

                        if (!/^\d{16}$/.test(tarjeta)) {
                            e.preventDefault();
                            alert("La tarjeta debe tener exactamente 16 números.");
                            numeroTarjeta.focus();
                            return;
                        }

                        if (!/^\d{2}\/\d{2}\/\d{4}$/.test(fecha)) {
                            e.preventDefault();
                            alert("La fecha debe tener el formato dd/MM/yyyy.");
                            fechaVencimiento.focus();
                            return;
                        }

                        const partes = fecha.split("/");
                        const mes = parseInt(partes[1]);
                        const anio = parseInt(partes[2]);

                        if (mes < 1 || mes > 12) {
                            e.preventDefault();
                            alert("El mes no es válido.");
                            fechaVencimiento.focus();
                            return;
                        }

                        if (anio < 2026) {
                            e.preventDefault();
                            alert("El año no puede ser menor a 2026.");
                            fechaVencimiento.focus();
                        }
                    });
                });
            </script>
        </section>
    </body>
</html>
