<div th:replace="~{layout :: layout('Pago', ~{::section})}"></div>

<section class="row justify-content-center">
    <div class="col-lg-8">
        <div class="mb-4">
            <h1 class="page-title">Realizar pedido</h1>
            <p class="page-subtitle">Selecciona tu método de pago para finalizar la compra.</p>
        </div>

        <div class="table-darkish p-4">
            <h4 class="mb-4">Seleccione su método de pago</h4>

            <div class="mb-4">
                <button type="button" class="btn btn-soft">
                    Tarjeta guardada: ****-****-1111
                </button>
            </div>

            <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>

            <h5 class="mb-3">Agregar otro:</h5>

            <form th:action="@{/pago/finalizar}" method="post" th:object="${form}">
                <div class="row g-3">
                    <div class="col-md-8">
                        <input class="form-control"
                               type="text"
                               placeholder="Número de la tarjeta"
                               th:field="*{numeroTarjeta}">
                    </div>

                    <div class="col-md-4">
                        <input class="form-control"
                               type="text"
                               placeholder="Código de seguridad"
                               th:field="*{codigoSeguridad}">
                    </div>

                    <div class="col-md-6">
                        <input class="form-control"
                               type="text"
                               placeholder="Fecha de vencimiento"
                               th:field="*{fechaVencimiento}">
                    </div>

                    <div class="col-md-6">
                        <input class="form-control"
                               type="text"
                               placeholder="Nombre del propietario"
                               th:field="*{nombrePropietario}">
                    </div>
                </div>

                <div class="mt-4 d-flex justify-content-end">
                    <button class="btn btn-brand px-5" type="submit">Finalizar</button>
                </div>
            </form>
        </div>
    </div>
</section>
