<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      lang="es"
      th:replace="~{layout :: layout(~{::title}, ~{::section})}">

    <head>
        <title>Mi cuenta</title>
    </head>

    <body>
        <section>
            <div class="mb-4 text-center">
                <h1 class="page-title" id="tituloCuenta">Configuración de la cuenta</h1>
                <p class="page-subtitle" id="subtituloCuenta">Actualiza tus datos principales.</p>
            </div>

            <div class="row justify-content-center">
                <div class="col-lg-8">
                    <div class="table-darkish p-4">

                        <div class="text-center mb-4">
                            <div style="width:120px;height:120px;border:3px solid #777;border-radius:50%;margin:0 auto;display:flex;align-items:center;justify-content:center;font-size:48px;">
                                👤
                            </div>
                        </div>

                        <div class="alert alert-success" th:if="${mensaje}" th:text="${mensaje}"></div>
                        <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>

                        <form th:action="@{/cuenta/actualizar}" method="post" th:object="${form}">
                            <div class="row g-3">

                                <div class="col-12">
                                    <label class="form-label fw-bold" id="lblNombre">Nombre</label>
                                    <input class="form-control"
                                           type="text"
                                           th:field="*{nombreUsuario}"
                                           placeholder="Nombre del usuario">
                                </div>

                                <div class="col-12">
                                    <label class="form-label fw-bold" id="lblCorreoElectronico">Correo electrónico</label>
                                    <input class="form-control"
                                           type="email"
                                           th:field="*{correo}"
                                           placeholder="Correo del usuario">
                                </div>

                                <div class="col-md-6">
                                    <label class="form-label fw-bold" id="lblContrasenaNueva">Contraseña nueva</label>
                                    <input class="form-control"
                                           type="password"
                                           th:field="*{nuevaPassword}"
                                           placeholder="Nueva contraseña">
                                </div>

                                <div class="col-md-6">
                                    <label class="form-label fw-bold" id="lblConfirmarContrasena">Confirmar contraseña</label>
                                    <input class="form-control"
                                           type="password"
                                           th:field="*{confirmarPassword}"
                                           placeholder="Confirmar contraseña">
                                </div>

                                <div class="col-12">
                                    <label class="form-label fw-bold" id="lblMetodoPago">Método de pago</label>
                                    <select class="form-select" th:field="*{metodoPagoPreferido}">
                                        <option value="" class="opt-seleccione">Seleccione</option>
                                        <option value="Tarjeta" class="opt-tarjeta">Tarjeta Crédito/Débito</option>
                                        <option value="Efectivo" class="opt-efectivo">Efectivo</option>
                                    </select>
                                </div>

                                <div class="col-12 mt-3">
                                    <button class="btn btn-brand w-100" type="submit" id="btnGuardarCambios">
                                        Guardar cambios
                                    </button>
                                </div>

                            </div>
                        </form>

                    </div>
                </div>
            </div>
        </section>
    </body>
</html>
