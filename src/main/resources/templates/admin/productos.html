<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      lang="es"
      th:replace="~{layout :: layout(~{::title}, ~{::section})}">

    <head>
        <title>Admin - Productos</title>
    </head>

    <body>
        <section>

            <div class="container mt-4">

                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div>
                        <h1 class="page-title m-0" id="tituloAdminProductos">
                            Admin · Productos
                        </h1>

                        <p class="page-subtitle m-0" id="subtituloAdminProductos">
                            Crear, editar, desactivar y ver inventario.
                        </p>
                    </div>

                    <a class="btn btn-brand" th:href="@{/admin/productos/nuevo}" id="btnNuevoProducto">
                        + Nuevo producto
                    </a>
                </div>

                <div class="table-darkish">
                    <table class="table table-borderless mb-0">

                        <thead>
                            <tr>
                                <th id="thId">ID</th>
                                <th id="thNombre">Nombre</th>
                                <th id="thMarca">Marca</th>
                                <th id="thTipo">Tipo</th>
                                <th id="thPrecio">Precio</th>
                                <th id="thStock">Stock</th>
                                <th id="thActivo">Activo</th>
                                <th class="text-end" id="thAcciones">Acciones</th>
                            </tr>
                        </thead>

                        <tbody>
                            <tr th:each="p : ${lista}">
                                <td th:text="${p.idProducto}"></td>
                                <td th:text="${p.nombre}"></td>
                                <td th:text="${p.marca.nombre}"></td>
                                <td th:text="${p.tipo.nombre}"></td>
                                <td>₡<span th:text="${p.precio}"></span></td>
                                <td th:text="${p.stock}"></td>

                                <td>
                                    <span th:if="${p.activo}" class="badge-stock txt-si">Sí</span>
                                    <span th:if="${!p.activo}" class="badge-out txt-no">No</span>
                                </td>

                                <td class="text-end">
                                    <div class="d-inline-flex gap-2">

                                        <a class="btn btn-soft btn-sm btn-editar"
                                           th:href="@{/admin/productos/editar/{id}(id=${p.idProducto})}">
                                            Editar
                                        </a>

                                        <form th:if="${p.activo}"
                                              th:action="@{/admin/productos/desactivar}"
                                              method="post">
                                            <input type="hidden" name="idProducto" th:value="${p.idProducto}">
                                            <button class="btn btn-danger-soft btn-sm btn-eliminar" type="submit">
                                                Eliminar
                                            </button>
                                        </form>

                                    </div>
                                </td>
                            </tr>
                        </tbody>

                    </table>
                </div>

                <div class="mt-3">
                    <a class="btn btn-soft" th:href="@{/productos}" id="btnVolverCatalogoAdmin">
                        Volver al catálogo
                    </a>
                </div>

            </div>

        </section>
    </body>
</html>
