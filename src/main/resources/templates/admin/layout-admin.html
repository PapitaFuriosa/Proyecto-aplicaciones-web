<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="es"
      th:fragment="layout(title, content)">

    <head>
        <meta charset="UTF-8">
        <title th:text="${title}">RepuestosCloud</title>

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" th:href="@{/css/estilos.css}">
    </head>

    <body>

        <nav class="navbar navbar-expand-lg">
            <div class="container">

                <a class="navbar-brand fw-bold d-flex align-items-center gap-2" th:href="@{/productos}">
                    <img th:src="@{/img/repuestos/logo.jpg}"
                         alt="Logo"
                         style="width:36px; height:36px; object-fit:cover; border-radius:50%;">
                    <span>RepuestosCloud</span>
                </a>

                <div class="ms-auto d-flex gap-2">

                    <a class="btn btn-soft btn-sm" th:href="@{/productos}">
                        Catálogo
                    </a>

                    <a class="btn btn-soft btn-sm"
                       sec:authorize="isAuthenticated()"
                       th:href="@{/cuenta}">
                        Mi cuenta
                    </a>

                    <form sec:authorize="isAuthenticated()"
                          th:action="@{/logout}"
                          method="post"
                          class="d-inline">
                        <button class="btn btn-danger-soft btn-sm">
                            Salir
                        </button>
                    </form>

                </div>
            </div>
        </nav>

        <div class="page-wrap">
            <div class="container" th:replace="${content}"></div>
        </div>

    </body>
</html>
