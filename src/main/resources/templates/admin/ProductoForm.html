<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      lang="es">

    <head>
        <meta charset="UTF-8">
        <title>Admin - Producto</title>

        <link rel="icon" type="image/jpeg" th:href="@{/img/repuestos/logo.jpg}">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" th:href="@{/css/estilos.css}">
    </head>

    <body>

        <nav class="navbar navbar-expand-lg">
            <div class="container">
                <a class="navbar-brand fw-bold d-flex align-items-center gap-2" th:href="@{/productos}">
                    <img th:src="@{/img/repuestos/logo.jpg}"
                         alt="Logo"
                         class="brand-logo">
                    <span>RepuestosCloud</span>
                </a>
            </div>
        </nav>

        <div class="container mt-4">

            <div class="mb-4">
                <h1 class="page-title"
                    th:text="${p.idProducto == null ? 'Nuevo producto' : 'Editar producto'}">
                    Producto
                </h1>
            </div>

            <div class="table-darkish p-4">
                <form th:action="@{/admin/productos/guardar}" method="post" enctype="multipart/form-data">

                    <input type="hidden" name="idProducto" th:value="${p.idProducto}">

                    <div class="row g-3">

                        <div class="col-md-6">
                            <label>Nombre</label>
                            <input class="form-control" name="nombre" th:value="${p.nombre}" required>
                        </div>

                        <div class="col-md-3">
                            <label>Precio</label>
                            <input class="form-control" type="number" step="0.01" name="precio" th:value="${p.precio}" required>
                        </div>

                        <div class="col-md-3">
                            <label>Stock</label>
                            <input class="form-control" type="number" min="0" name="stock" th:value="${p.stock}" required>
                        </div>

                        <div class="col-md-6">
                            <label>Marca</label>
                            <select class="form-select" name="idMarca">
                                <option th:each="m : ${marcas}"
                                        th:value="${m.idMarca}"
                                        th:text="${m.nombre}"
                                        th:selected="${p.marca != null && p.marca.idMarca == m.idMarca}">
                                </option>
                            </select>
                        </div>

                        <div class="col-md-6">
                            <label>Tipo</label>
                            <select class="form-select" name="idTipo">
                                <option th:each="t : ${tipos}"
                                        th:value="${t.idTipo}"
                                        th:text="${t.nombre}"
                                        th:selected="${p.tipo != null && p.tipo.idTipo == t.idTipo}">
                                </option>
                            </select>
                        </div>

                        <div class="col-12">
                            <label>Descripción</label>
                            <textarea class="form-control" name="descripcion" rows="3"
                                      th:text="${p.descripcion}"></textarea>
                        </div>

                        <div class="col-12">
                            <label>Compatibilidad</label>
                            <textarea class="form-control"
                                      name="compatibilidad"
                                      rows="2"
                                      placeholder="Ej: Corolla 2015-2022, Yaris 2018-2021"
                                      th:text="${p.compatibilidad}"></textarea>
                        </div>

                        <div class="col-md-6">
                            <label>Imagen</label>
                            <input class="form-control" type="file" name="imagen">
                        </div>

                        <div class="col-md-6">
                            <label>Activo</label>
                            <select class="form-select" name="activo">
                                <option value="true" th:selected="${p.activo == null || p.activo}">Sí</option>
                                <option value="false" th:selected="${p.activo != null && !p.activo}">No</option>
                            </select>
                        </div>

                    </div>

                    <div class="mt-4">
                        <button class="btn btn-brand" type="submit">Guardar</button>
                        <a class="btn btn-soft" th:href="@{/admin/productos}">Cancelar</a>
                    </div>

                </form>
            </div>

        </div>

    </body>
</html>
