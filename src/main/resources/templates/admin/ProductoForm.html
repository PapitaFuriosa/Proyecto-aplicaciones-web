<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      lang="es">

    <head>
        <meta charset="UTF-8">
        <title>Admin - Producto</title>

        <link rel="icon" type="image/jpeg" th:href="@{/img/repuestos/logo.jpg}">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" th:href="@{/css/estilos.css}">
    </head>

    <body>

        <nav class="navbar navbar-expand-lg">
            <div class="container">
                <a class="navbar-brand fw-bold d-flex align-items-center gap-2" th:href="@{/productos}">
                    <img th:src="@{/img/repuestos/logo.jpg}"
                         alt="Logo"
                         class="brand-logo">
                    <span id="tituloApp">RepuestosCloud</span>
                </a>

                <div class="ms-auto d-flex gap-2">
                    <a class="btn btn-soft btn-sm" th:href="@{/admin/productos}" id="btnVolverAdminProductos">
                        Volver
                    </a>

                    <button type="button" class="btn btn-soft btn-sm" onclick="cambiarIdioma()">
                        EN/ES
                    </button>
                </div>
            </div>
        </nav>

        <div class="container mt-4">

            <div class="mb-4">
                <h1 class="page-title"
                    id="tituloProductoForm"
                    th:attr="data-nuevo=${p.idProducto == null}"
                    th:text="${p.idProducto == null ? 'Nuevo producto' : 'Editar producto'}">
                </h1>
            </div>

            <div class="table-darkish p-4">

                <form th:action="@{/admin/productos/guardar}" method="post" enctype="multipart/form-data">

                    <input type="hidden" name="idProducto" th:value="${p.idProducto}">

                    <div class="row g-3">

                        <div class="col-md-6">
                            <label id="lblNombreProducto">Nombre</label>
                            <input class="form-control" name="nombre" th:value="${p.nombre}" required>
                        </div>

                        <div class="col-md-3">
                            <label id="lblPrecioProducto">Precio</label>
                            <input class="form-control" type="number" step="0.01" name="precio" th:value="${p.precio}" required>
                        </div>

                        <div class="col-md-3">
                            <label id="lblStockProducto">Stock</label>
                            <input class="form-control" type="number" min="0" name="stock" th:value="${p.stock}" required>
                        </div>

                        <div class="col-md-6">
                            <label id="lblMarcaProducto">Marca</label>
                            <select class="form-select" name="idMarca">
                                <option th:each="m : ${marcas}"
                                        th:value="${m.idMarca}"
                                        th:text="${m.nombre}"
                                        th:selected="${p.marca != null && p.marca.idMarca == m.idMarca}">
                                </option>
                            </select>
                        </div>

                        <div class="col-md-6">
                            <label id="lblTipoProducto">Tipo</label>
                            <select class="form-select" name="idTipo">
                                <option th:each="t : ${tipos}"
                                        th:value="${t.idTipo}"
                                        th:text="${t.nombre}"
                                        th:selected="${p.tipo != null && p.tipo.idTipo == t.idTipo}">
                                </option>
                            </select>
                        </div>

                        <div class="col-12">
                            <label id="lblDescripcionProducto">Descripción</label>
                            <textarea class="form-control" name="descripcion" rows="3"
                                      th:text="${p.descripcion}"></textarea>
                        </div>

                        <div class="col-12">
                            <label id="lblCompatibilidadProducto">Compatibilidad</label>
                            <textarea class="form-control"
                                      name="compatibilidad"
                                      rows="2"
                                      id="phCompatibilidadProducto"
                                      placeholder="Ej: Corolla 2015-2022"
                                      th:text="${p.compatibilidad}"></textarea>
                        </div>

                        <div class="col-md-6">
                            <label id="lblImagenProducto">Imagen</label>
                            <input class="form-control" type="file" name="imagen">
                        </div>

                        <div class="col-md-6">
                            <label id="lblActivoProducto">Activo</label>
                            <select class="form-select" name="activo">
                                <option value="true"
                                        class="opt-si"
                                        th:selected="${p.activo == null || p.activo}">
                                    Sí
                                </option>
                                <option value="false"
                                        class="opt-no"
                                        th:selected="${p.activo != null && !p.activo}">
                                    No
                                </option>
                            </select>
                        </div>

                    </div>

                    <div class="mt-4">
                        <button class="btn btn-brand" type="submit" id="btnGuardarProducto">Guardar</button>
                        <a class="btn btn-soft" th:href="@{/admin/productos}" id="btnCancelarProducto">Cancelar</a>
                    </div>

                </form>

            </div>

        </div>

        <script>
            let idioma = localStorage.getItem("idioma") || "es";

            function aplicarIdioma() {
                const textos = {
                    es: {
                        tituloApp: "RepuestosCloud",
                        btnVolverAdminProductos: "Volver",
                        tituloProductoFormNuevo: "Nuevo producto",
                        tituloProductoFormEditar: "Editar producto",
                        lblNombreProducto: "Nombre",
                        lblPrecioProducto: "Precio",
                        lblStockProducto: "Stock",
                        lblMarcaProducto: "Marca",
                        lblTipoProducto: "Tipo",
                        lblDescripcionProducto: "Descripción",
                        lblCompatibilidadProducto: "Compatibilidad",
                        lblImagenProducto: "Imagen",
                        lblActivoProducto: "Activo",
                        btnGuardarProducto: "Guardar",
                        btnCancelarProducto: "Cancelar",
                        phCompatibilidadProducto: "Ej: Corolla 2015-2022",
                        optSi: "Sí",
                        optNo: "No"
                    },
                    en: {
                        tituloApp: "RepuestosCloud",
                        btnVolverAdminProductos: "Back",
                        tituloProductoFormNuevo: "New product",
                        tituloProductoFormEditar: "Edit product",
                        lblNombreProducto: "Name",
                        lblPrecioProducto: "Price",
                        lblStockProducto: "Stock",
                        lblMarcaProducto: "Brand",
                        lblTipoProducto: "Type",
                        lblDescripcionProducto: "Description",
                        lblCompatibilidadProducto: "Compatibility",
                        lblImagenProducto: "Image",
                        lblActivoProducto: "Active",
                        btnGuardarProducto: "Save",
                        btnCancelarProducto: "Cancel",
                        phCompatibilidadProducto: "Ex: Corolla 2015-2022",
                        optSi: "Yes",
                        optNo: "No"
                    }
                };

                const t = textos[idioma];

                for (const id in t) {
                    const el = document.getElementById(id);
                    if (el) {
                        el.textContent = t[id];
                    }
                }

                const tituloProductoForm = document.getElementById("tituloProductoForm");
                if (tituloProductoForm) {
                    const esNuevo = tituloProductoForm.getAttribute("data-nuevo") === "true";
                    tituloProductoForm.textContent = esNuevo ? t.tituloProductoFormNuevo : t.tituloProductoFormEditar;
                }

                const phCompatibilidadProducto = document.getElementById("phCompatibilidadProducto");
                if (phCompatibilidadProducto) {
                    phCompatibilidadProducto.placeholder = t.phCompatibilidadProducto;
                }

                document.querySelectorAll(".opt-si").forEach(el => el.textContent = t.optSi);
                document.querySelectorAll(".opt-no").forEach(el => el.textContent = t.optNo);
            }

            function cambiarIdioma() {
                idioma = idioma === "es" ? "en" : "es";
                localStorage.setItem("idioma", idioma);
                aplicarIdioma();
            }

            document.addEventListener("DOMContentLoaded", aplicarIdioma);
        </script>

    </body>
</html>
