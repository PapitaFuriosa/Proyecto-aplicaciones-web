<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <title>Registro</title>
 
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" th:href="@{/css/estilos.css}">
    </head>
    <body>

        <div class="container mt-5">
            <div class="row justify-content-center">
                <div class="col-md-6">

                    <div class="table-darkish p-4">
                        <h2 class="page-title mb-1">Registro</h2>
                        <p class="page-subtitle mb-3">Creá tu cuenta para comprar.</p>

                        <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>

                        <form th:action="@{/registro}" method="post" th:object="${form}">

                            <div class="mb-3">
                                <label class="form-label">Correo</label>
                                <input class="form-control" type="email" th:field="*{correo}">
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Contraseña</label>
                                <input class="form-control" type="password" th:field="*{password}">
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Confirmar contraseña</label>
                                <input class="form-control" type="password" th:field="*{confirmarPassword}">
                            </div>

                            <button class="btn btn-brand w-100 mt-3" type="submit">
                                Crear cuenta
                            </button>

                        </form>

                        <div class="mt-3">
                            <a class="btn btn-soft w-100" th:href="@{/login}">
                                Volver al login
                            </a>
                        </div>

                    </div>

                </div>
            </div>
        </div>

    </body>
</html>
