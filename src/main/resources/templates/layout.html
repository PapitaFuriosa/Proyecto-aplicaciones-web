<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="es"
      th:fragment="layout(title, content)">

    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />

        <title th:replace="${title}">RepuestosCloud</title>

        <link rel="icon" type="image/jpeg" th:href="@{/img/repuestos/logo.jpg}">

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" th:href="@{/css/estilos.css}">
    </head>

    <body>

        <nav class="navbar navbar-expand-lg">
            <div class="container">
                <a class="navbar-brand fw-bold d-flex align-items-center gap-2" th:href="@{/productos}">

                    <img th:src="@{/img/repuestos/logo.jpg}"
                         alt="Logo"
                         style="width:36px; height:36px; object-fit:cover; border-radius:50%;">

                    <span id="tituloApp">RepuestosCloud</span>
                </a>

                <div class="ms-auto d-flex gap-2">

                    <a class="btn btn-soft btn-sm" th:href="@{/productos}" id="navCatalogo">
                        Catálogo
                    </a>

                    <a class="btn btn-soft btn-sm"
                       sec:authorize="hasRole('ADMIN')"
                       th:href="@{/admin}"
                       id="navAdmin">
                        Admin
                    </a>

                    <a class="btn btn-soft btn-sm" th:href="@{/carrito}" id="navCarrito">
                        🛒 Carrito
                    </a>

                    <a class="btn btn-soft btn-sm"
                       sec:authorize="isAuthenticated()"
                       th:href="@{/pedidos}"
                       id="navPedidos">
                        Mis pedidos
                    </a>

                    <a class="btn btn-soft btn-sm"
                       sec:authorize="isAuthenticated()"
                       th:href="@{/cuenta}"
                       id="navCuenta">
                        Mi cuenta
                    </a>

                    <a class="btn btn-brand btn-sm"
                       sec:authorize="isAnonymous()"
                       th:href="@{/login}"
                       id="navEntrar">
                        Entrar
                    </a>

                    <form sec:authorize="isAuthenticated()"
                          th:action="@{/logout}"
                          method="post"
                          class="d-inline">
                        <button class="btn btn-danger-soft btn-sm" type="submit" id="navSalir">
                            Salir
                        </button>
                    </form>

                    <button type="button" class="btn btn-soft btn-sm" onclick="cambiarIdioma()">
                        EN/ES
                    </button>

                </div>
            </div>
        </nav>

        <div class="page-wrap">
            <div class="container mt-4" th:insert="${content}"></div>
        </div>

        <script>
            let idioma = localStorage.getItem("idioma") || "es";

            function aplicarIdioma() {

                        lblColores: "Colores:",
                        lblCaracteristicas: "Características",
                        lblDescripcion: "Descripción:",
                        btnAgregarCarrito: "Agregar al carrito",

                        tituloCuenta: "Configuración de la cuenta",
                        subtituloCuenta: "Actualiza tus datos principales.",
                        lblNombre: "Nombre",
                        lblCorreoElectronico: "Correo electrónico",
                        lblContrasenaNueva: "Contraseña nueva",

                        tituloAdmin: "Panel Administrativo",

                        tituloProductoFormNuevo: "Nuevo producto",
                        tituloProductoFormEditar: "Editar producto",
                        lblNombreProducto: "Nombre",
                        lblPrecioProducto: "Precio",
                        lblStockProducto: "Stock",
                        lblMarcaProducto: "Marca",
                        lblTipoProducto: "Tipo",
                        lblDescripcionProducto: "Descripción",
                        lblCompatibilidadProducto: "Compatibilidad",
                        lblImagenProducto: "Imagen",
                        lblActivoProducto: "Activo",
                        btnGuardarProducto: "Guardar",
                        btnCancelarProducto: "Cancelar"
                    },
                    en: {
                        tituloApp: "RepuestosCloud",
                        navCatalogo: "Catalog",
                        navAdmin: "Admin",
                        navCarrito: "🛒 Cart",
                        navPedidos: "My orders",
                        navCuenta: "My account",
                        navEntrar: "Login",
                        navSalir: "Logout",

                        tituloCatalogo: "Spare parts catalog",
                        subtituloCatalogo: "Search by name or filter by brand and type.",

                        tituloPedidos: "Order history",

                        tituloPago: "Place order",

                        lblMetodoEfectivo: "Cash",
                        phNumeroTarjeta: "Card number",
                        phCodigoSeguridad: "Security code",

                        phNombrePropietario: "Cardholder name",
                        btnFinalizarPago: "Finish",

                        tituloDetalleProducto: "Product detail",
                        subtituloDetalleProducto: "Choose the color and review the features before buying.",
                        lblCompatibilidad: "Compatibility:",
                        lblCompatibilidad2: "Compatibility:",
                        lblColores: "Colors:",
                        lblCaracteristicas: "Features",
                        lblDescripcion: "Description:",

                        tituloCuenta: "Account settings",

                        lblMetodoPago: "Payment method",

                        optTarjeta: "Credit/Debit card",
                        optEfectivo: "Cash",
                        btnGuardarCambios: "Save changes",

                        tituloAdmin: "Admin panel",
                        subtituloAdmin: "Manage the parts catalog.",
                        tituloCatalogoAdmin: "Product catalog",
                        descCatalogoAdmin: "Add, edit and deactivate products from the main catalog.",
                        btnModificarCatalogo: "Edit catalog",

                        tituloAdminProductos: "Admin · Products",
                        subtituloAdminProductos: "Create, edit, deactivate and view inventory.",
                        btnNuevoProducto: "+ New product",
                        thId: "ID",
                        thNombre: "Name",
                        thMarca: "Brand",
                        thTipo: "Type",
                        thActivo: "Active",
                        thAcciones: "Actions",
                        btnVolverCatalogoAdmin: "Back to catalog",

                        tituloProductoFormNuevo: "New product",
                        tituloProductoFormEditar: "Edit product",
                        lblNombreProducto: "Name",
                        lblPrecioProducto: "Price",
                        lblStockProducto: "Stock",
                        lblMarcaProducto: "Brand",
                        lblTipoProducto: "Type",
                        lblDescripcionProducto: "Description",
                        lblCompatibilidadProducto: "Compatibility",
                        lblImagenProducto: "Image",
                        lblActivoProducto: "Active",
                        btnGuardarProducto: "Save",
                        btnCancelarProducto: "Cancel"
                    }
                };

                const t = textos[idioma];

                for (const id in t) {
                    const el = document.getElementById(id);
                    if (el) {
                        el.textContent = t[id];
                    }
                }

                const phNumeroTarjeta = document.getElementById("phNumeroTarjeta");
                if (phNumeroTarjeta)
                    phNumeroTarjeta.placeholder = t.phNumeroTarjeta;

                const phCodigoSeguridad = document.getElementById("phCodigoSeguridad");
                if (phCodigoSeguridad)
                    phCodigoSeguridad.placeholder = t.phCodigoSeguridad;

                const phFechaVencimiento = document.getElementById("phFechaVencimiento");
                if (phFechaVencimiento)
                    phFechaVencimiento.placeholder = t.phFechaVencimiento;

                const phNombrePropietario = document.getElementById("phNombrePropietario");
                if (phNombrePropietario)
                    phNombrePropietario.placeholder = t.phNombrePropietario;

                document.querySelectorAll(".btn-ver").forEach(el => el.textContent = idioma === "es" ? "Ver" : "View");
                document.querySelectorAll(".btn-editar").forEach(el => el.textContent = idioma === "es" ? "Editar" : "Edit");
                document.querySelectorAll(".btn-eliminar").forEach(el => el.textContent = idioma === "es" ? "Eliminar" : "Delete");
                document.querySelectorAll(".btn-agregar").forEach(el => el.textContent = idioma === "es" ? "Agregar" : "Add");

                document.querySelectorAll(".txt-sin-stock").forEach(el => el.textContent = idioma === "es" ? "Sin stock" : "Out of stock");
                document.querySelectorAll(".txt-stock").forEach(el => el.textContent = idioma === "es" ? "Stock:" : "Stock:");
                document.querySelectorAll(".txt-si").forEach(el => el.textContent = idioma === "es" ? "Sí" : "Yes");
                document.querySelectorAll(".txt-no").forEach(el => el.textContent = idioma === "es" ? "No" : "No");

                document.querySelectorAll(".opt-seleccione").forEach(el => el.textContent = t.optSeleccione);
                document.querySelectorAll(".opt-tarjeta").forEach(el => el.textContent = t.optTarjeta);
                document.querySelectorAll(".opt-efectivo").forEach(el => el.textContent = t.optEfectivo);

                const tituloProductoForm = document.getElementById("tituloProductoForm");
                if (tituloProductoForm) {
                    const esNuevo = tituloProductoForm.getAttribute("data-nuevo") === "true";
                    tituloProductoForm.textContent = esNuevo ? t.tituloProductoFormNuevo : t.tituloProductoFormEditar;
                }
            }

            function cambiarIdioma() {
                idioma = idioma === "es" ? "en" : "es";
                localStorage.setItem("idioma", idioma);
                aplicarIdioma();
            }

            document.addEventListener("DOMContentLoaded", aplicarIdioma);
        </script>

    </body>
</html>
