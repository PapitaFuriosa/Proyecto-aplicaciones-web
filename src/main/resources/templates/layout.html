<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="es"
      th:fragment="layout(title, content)">

    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />

        <title th:replace="${title}">RepuestosCloud</title>

        <link rel="icon" type="image/jpeg" th:href="@{/img/repuestos/logo.jpg}">

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" th:href="@{/css/estilos.css}">
    </head>

    <body>

        <nav class="navbar navbar-expand-lg">
            <div class="container">
                <a class="navbar-brand fw-bold d-flex align-items-center gap-2" th:href="@{/productos}">

                    <img th:src="@{/img/repuestos/logo.jpg}"
                         alt="Logo"
                         style="width:36px; height:36px; object-fit:cover; border-radius:50%;">

                    <span>RepuestosCloud</span>
                </a>

                <div class="ms-auto d-flex gap-2">

                    <a class="btn btn-soft btn-sm" th:href="@{/productos}">
                        Catálogo
                    </a>

                    <a class="btn btn-soft btn-sm"
                       sec:authorize="hasRole('ADMIN')"
                       th:href="@{/admin}">
                        Admin
                    </a>

                    <a class="btn btn-soft btn-sm" th:href="@{/carrito}">
                        🛒 Carrito
                    </a>

                    <a class="btn btn-soft btn-sm"
                       sec:authorize="isAuthenticated()"
                       th:href="@{/mis-pedidos}">
                        Mis pedidos
                    </a>

                    <a class="btn btn-soft btn-sm"
                       sec:authorize="isAuthenticated()"
                       th:href="@{/cuenta}">
                        Mi cuenta
                    </a>

                    <a class="btn btn-brand btn-sm"
                       sec:authorize="isAnonymous()"
                       th:href="@{/login}">
                        Entrar
                    </a>

                    <form sec:authorize="isAuthenticated()"
                          th:action="@{/logout}"
                          method="post"
                          class="d-inline">
                        <button class="btn btn-danger-soft btn-sm" type="submit">
                            Salir
                        </button>
                    </form>

                </div>
            </div>
        </nav>

        <div class="page-wrap">
            <div class="container mt-4" th:insert="${content}"></div>
        </div>

    </body>
</html>
