<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      lang="es"
      th:replace="~{layout :: layout(~{::title}, ~{::section})}">

    <head>
        <title>Pedidos</title>
    </head>

    <body>
        <section>
            <div class="mb-4">
                <h1 class="page-title" id="tituloPedidos">Historial de pedidos</h1>
                <p class="page-subtitle" id="subtituloPedidos">Tus compras confirmadas.</p>
            </div>

            <div class="table-darkish p-3" th:if="${#lists.isEmpty(pedidos)}">
                <p class="m-0" id="textoSinPedidos">Aún no tenés pedidos.</p>
                <a class="btn btn-soft mt-3" th:href="@{/productos}" id="btnIrCatalogo">Ir al catálogo</a>
            </div>

            <div class="table-darkish" th:if="${!#lists.isEmpty(pedidos)}">
                <table class="table table-borderless mb-0">
                    <thead>
                        <tr>
                            <th id="thIdPedido">ID</th>
                            <th id="thFecha">Fecha</th>
                            <th id="thEstado">Estado</th>
                            <th id="thTotalPedidos">Total</th>
                            <th id="thDetalle">Detalle</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="p : ${pedidos}">
                            <td th:text="${p.idPedido}"></td>
                            <td th:text="${p.fecha}"></td>
                            <td th:text="${p.estado}"></td>
                            <td>₡<span th:text="${p.total}"></span></td>
                            <td>
                                <a class="btn btn-soft btn-sm btn-ver"
                                   th:href="@{/mis-pedidos/{id}(id=${p.idPedido})}">
                                    Ver
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="mt-3">
                <a class="btn btn-soft" th:href="@{/productos}" id="btnVolverProductos">
                    Volver a productos
                </a>
            </div>
        </section>
    </body>
</html>
