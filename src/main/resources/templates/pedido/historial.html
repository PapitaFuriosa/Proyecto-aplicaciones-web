<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      lang="es"
      th:replace="~{layout :: layout(~{::title}, ~{::section})}">

    <head>
        <title>Historial de pedidos</title>
    </head>

    <body>
        <section>

            <div class="mb-4">
                <h1 class="page-title">Historial de pedidos</h1>
                <p class="page-subtitle">Consultá tus compras realizadas.</p>
            </div>

            <div class="table-darkish p-3">

                <div th:if="${#lists.isEmpty(pedidos)}" class="vacio">
                    No has realizado pedidos todavía.
                </div>

                <table class="table table-borderless mb-0"
                       th:if="${!#lists.isEmpty(pedidos)}">

                    <thead>
                        <tr>
                            <th>ID Pedido</th>
                            <th>Fecha</th>
                            <th>Estado</th>
                            <th>Total</th>
                            <th>Detalle</th>
                        </tr>
                    </thead>

                    <tbody>
                        <tr th:each="pedido : ${pedidos}">
                            <td th:text="${pedido.idPedido}"></td>
                            <td th:text="${#temporals.format(pedido.fecha, 'dd/MM/yyyy')}"></td>
                            <td th:text="${pedido.estado}"></td>
                            <td>
                                ₡<span th:text="${#numbers.formatDecimal(pedido.total,0,'COMMA',0,'POINT')}"></span>
                            </td>
                            <td>
                                <a th:href="@{/mis-pedidos/{id}(id=${pedido.idPedido})}"
                                   class="btn btn-soft btn-sm">
                                    Ver
                                </a>
                            </td>
                        </tr>
                    </tbody>

                </table>

            </div>

            <div class="mt-3">
                <a th:href="@{/productos}" class="btn btn-soft">
                    Volver a productos
                </a>
            </div>

        </section>
    </body>
</html>
