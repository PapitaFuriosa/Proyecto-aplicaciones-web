<div th:replace="~{layout :: layout('Detalle del producto', ~{::section})}"></div>

<section>
    <div class="mb-4">
        <h1 class="page-title">Detalle del producto</h1>
        <p class="page-subtitle">Selecciona el color y revisa las características antes de comprar.</p>
    </div>

    <div class="row g-4 align-items-start">
        <div class="col-lg-5">
            <div id="previewBox"
                 class="table-darkish p-4 text-center"
                 style="min-height: 420px; display:flex; align-items:center; justify-content:center; border-radius:18px; transition:all .25s ease;">

                <img id="mainProductImage"
                     th:src="${p.rutaImagen != null ? p.rutaImagen : 'https://via.placeholder.com/420x320/F0F0F0/111111?text=Producto'}"
                     alt="Producto"
                     style="max-width:100%; max-height:320px; object-fit:contain; border-radius:14px;">

            </div>
        </div>

        <div class="col-lg-7">
            <div class="table-darkish p-4">

                <h2 class="page-title mb-3" th:text="${p.nombre}">Nombre del artículo</h2>

                <div class="mb-3">
                    <span class="fw-bold">Compatibilidad:</span>
                    <span th:text="${p.compatibilidad}">Compatibilidad</span>
                </div>

                <div class="mb-3">
                    <span class="fw-bold">Colores:</span>

                    <div class="d-flex align-items-center gap-2 mt-2 flex-wrap">
                        <button th:each="c : ${colores}"
                                type="button"
                                class="color-swatch"
                                th:style="'width:26px;height:26px;border-radius:50%;border:2px solid #444;background:' + ${c.codigoHex} + ';'"
                                th:attr="data-nombre=${c.nombre},
                                         data-hex=${c.codigoHex},
                                         data-img=${c.imagenUrl}"
                                onclick="seleccionarColor(this)">
                        </button>

                        <span id="selectedColorText"
                              class="badge rounded-pill text-bg-light ms-2"
                              th:text="${#lists.isEmpty(colores) ? 'Único' : colores[0].nombre}">
                            Color
                        </span>
                    </div>
                </div>

                <div class="mb-4">
                    <span class="price fs-4 fw-bold">
                        ₡<span th:text="${p.precio}">0.00</span>
                    </span>
                </div>

                <form th:action="@{/carrito/agregar}" method="post" class="mb-4">
                    <input type="hidden" name="idProducto" th:value="${p.idProducto}">
                    <button class="btn btn-brand px-4" type="submit">Agregar al carrito</button>
                </form>

                <div class="table-darkish p-3" style="background:rgba(255,255,255,.04);">
                    <h5 class="mb-3 text-center">Características</h5>

                    <div class="mb-3">
                        <span class="fw-bold">Descripción:</span>
                        <p class="m-0 mt-2" th:text="${p.descripcion}">
                            Descripción del producto.
                        </p>
                    </div>

                    <div>
                        <span class="fw-bold">Compatibilidad:</span>
                        <p class="m-0 mt-2" th:text="${p.compatibilidad}">
                            Compatibilidad del producto.
                        </p>
                    </div>
                </div>

            </div>
        </div>
    </div>
</section>

<script th:inline="javascript">
    const nombreProducto = /*[[${p.nombre}]]*/ 'Producto';

    function seleccionarColor(btn) {
        const nombre = btn.getAttribute('data-nombre');
        const hex = btn.getAttribute('data-hex');
        const img = btn.getAttribute('data-img');

        const selectedText = document.getElementById('selectedColorText');
        const previewBox = document.getElementById('previewBox');
        const mainImage = document.getElementById('mainProductImage');

        selectedText.textContent = nombre;

        previewBox.style.boxShadow = `0 0 0 3px ${hex}40 inset, 0 10px 25px ${hex}30`;

        document.querySelectorAll('.color-swatch').forEach(el => {
            el.style.transform = 'scale(1)';
            el.style.boxShadow = 'none';
        });

        btn.style.transform = 'scale(1.12)';
        btn.style.boxShadow = `0 0 0 3px ${hex}55`;

        if (img && img.trim() !== '') {
            mainImage.src = img;
        } else {
            const hexClean = hex.replace('#', '');
            mainImage.src = `https://via.placeholder.com/420x320/${hexClean}/FFFFFF?text=${encodeURIComponent(nombreProducto + ' - ' + nombre)}`;
        }
    }

    window.addEventListener('DOMContentLoaded', () => {
        const first = document.querySelector('.color-swatch');
        if (first) {
            seleccionarColor(first);
        }
    });
</script>
