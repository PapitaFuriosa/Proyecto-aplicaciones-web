<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      lang="es"
      th:replace="~{layout :: layout(~{::title}, ~{::section})}">

    <head>
        <title>Carrito</title>
    </head>

    <body>
        <section>

            <div class="mb-4">
                <h1 class="page-title">Carrito</h1>
                <p class="page-subtitle">Modificá cantidades o realizá tu pedido.</p>
            </div>

            <div class="table-darkish p-3" th:if="${#lists.isEmpty(items)}">
                <p class="m-0">Tu carrito está vacío.</p>
                <a class="btn btn-soft mt-3" th:href="@{/productos}">Ir al catálogo</a>
            </div>

            <div th:if="${!#lists.isEmpty(items)}">

                <div class="table-darkish">
                    <table class="table table-borderless mb-0">

                        <thead>
                            <tr>
                                <th>Producto</th>
                                <th>Precio</th>
                                <th style="width:160px">Cantidad</th>
                                <th>Subtotal</th>
                                <th></th>
                            </tr>
                        </thead>

                        <tbody>

                            <tr th:each="it : ${items}">

                                <td class="align-middle">
                                    <div class="d-flex align-items-center gap-2">

                                        <img th:src="${it.img != null and !#strings.isEmpty(it.img)} ? ${it.img} : @{/img/logo.jpg}"
                                             style="width:60px;height:45px;object-fit:cover;border-radius:10px"
                                             alt="Producto">

                                        <span th:text="${it.nombre}"></span>

                                    </div>
                                </td>

                                <td class="align-middle">
                                    ₡<span th:text="${it.precio}"></span>
                                </td>

                                <td class="align-middle">
                                    <form class="d-flex gap-2"
                                          th:action="@{/carrito/actualizar}"
                                          method="post">

                                        <input type="hidden"
                                               name="idProducto"
                                               th:value="${it.idProducto}">

                                        <input class="form-control"
                                               type="number"
                                               name="cantidad"
                                               min="1"
                                               th:attr="max=${it.stock}"
                                               th:value="${it.cantidad}">

                                        <button class="btn btn-soft btn-sm" type="submit">
                                            OK
                                        </button>

                                    </form>
                                </td>

                                <td class="align-middle">
                                    ₡<span th:text="${it.subtotal}"></span>
                                </td>

                                <td class="align-middle text-end">
                                    <form th:action="@{/carrito/eliminar}"
                                          method="post">

                                        <input type="hidden"
                                               name="idProducto"
                                               th:value="${it.idProducto}">

                                        <button class="btn btn-danger-soft btn-sm" type="submit">
                                            Eliminar
                                        </button>

                                    </form>
                                </td>

                            </tr>

                        </tbody>
                    </table>
                </div>

                <div class="total-box mt-3 d-flex justify-content-between align-items-center">

                    <div class="fw-bold">Total:</div>

                    <div class="price">
                        ₡<span th:text="${total}"></span>
                    </div>

                </div>

                <form class="mt-3"
                      th:action="@{/pago}"
                      method="get">

                    <button class="btn btn-brand w-100" type="submit">
                        Realizar pedido
                    </button>

                </form>

            </div>

        </section>
    </body>
</html>
