<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <title>Login</title>
        <link rel="stylesheet" th:href="@{/css/estilos.css}">
    </head>
    <body class="login-page">

        <div class="login-wrapper">
            <div class="login-card">
                <h2>Iniciar sesión</h2>
                <p class="login-subtitle">Accedé a tu cuenta para entrar a RepuestosCloud.</p>

                <div class="mensaje-logout" th:if="${mensaje}" th:text="${mensaje}"></div>

                <div class="mensaje-error" th:if="${param.error}">
                    Correo o contraseña incorrectos
                </div>

                <div class="mensaje-logout" th:if="${param.logout}">
                    Sesión cerrada correctamente
                </div>

                <form th:action="@{/login}" method="post">
                    <div class="login-group">
                        <label>Correo</label>
                        <input type="email" name="username" placeholder="Ingresá tu correo" />
                    </div>

                    <div class="login-group">
                        <label>Contraseña</label>
                        <input type="password" name="password" placeholder="Ingresá tu contraseña" />
                    </div>

                    <button type="submit" class="btn-login">Entrar</button>
                </form>

                <div class="register-link">
                    <p>¿No tienes cuenta?</p>
                    <a th:href="@{/registro}">Registrarse</a>
                </div>
            </div>
        </div>

    </body>
</html>
